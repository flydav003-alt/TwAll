name: Daily stock data update

on:
  schedule:
    # Taiwan market close update. 07:31 UTC = 15:35 Asia/Taipei.
    - cron: "31 7 * * 1-5"
  workflow_dispatch:

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy openpyxl requests

      - name: Fetch stock data
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python fetch_data.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/screener_data.json data/market_data.json data/stats.db
          git diff --staged --quiet || git commit -m "chore: auto-update screener data $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M %Z')"
          git push

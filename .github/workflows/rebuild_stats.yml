name: Rebuild Stats Summary

# 只能在 GitHub 網頁的 Actions 頁籤手動按「Run workflow」觸發，
# 不會自動排程、也不會在 push 時自動執行。
on:
  workflow_dispatch: {}

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas yfinance requests

      - name: Run rebuild_stats.py
        run: python rebuild_stats.py

      - name: Commit updated stats.db
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.db
          git diff --staged --quiet || git commit -m "chore: rebuild summary_stats (manual trigger)"
          git push
